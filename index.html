<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>GitHu Issues Tracker</title>

    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@5" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[#f7f9f9]">
    <!-- Login Section  -->
    <section class="">
      <div class="flex justify-center items-center h-screen">
        <fieldset
          class="fieldset bg-white border border-white shadow-2xl rounded-box p-10 space-y-6"
        >
          <div class="flex flex-col justify-center items-center">
            <img src="./assets/github-logo.png" alt="GitHub Logo" />
            <h1 class="font-bold text-3xl">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
          </div>

          <div>
            <div class="flex flex-col">
              <label class="font-bold text-xl">Username</label>
              <input
                id="username"
                type="text"
                class="input mt-2 mb-1.5 p-3"
                placeholder="Enter Username"
              />
              <h3 class="font-semibold text-sm text-[#4A00FF]">
                Default: admin
              </h3>
            </div>
            <div class="flex flex-col mt-4 mb-6">
              <label class="font-bold text-xl">Password</label>
              <input
                id="password"
                type="password"
                class="input mt-2 mb-1.5 p-3"
                placeholder="Enter Password"
              />
              <h3 class="font-semibold text-sm text-[#4A00FF]">
                Default: admin123
              </h3>
            </div>

            <button
              id="loginBtn"
              class="btn mt-4 w-full bg-[#4A00FF] text-white"
            >
              Sign In
            </button>
          </div>

          
          
          </div>
        </fieldset>
      </div>
    </section>
  </body>
</html>

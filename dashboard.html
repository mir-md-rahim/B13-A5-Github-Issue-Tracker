<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHu Issues Tracker</title>

    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@5" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[#f7f9f9]">
    <section>
      <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="navbar w-11/12 mx-auto px-0">
          <div class="flex-1">
            <div class="flex items-center gap-1">
              <img
                class="h-[30px] w-[30px]"
                src="./assets/github-logo.png"
                alt="github-logo"
              />
              <a class="font-bold text-lg hidden sm:inline-block"
                >GitHub Issues Tracker</a
              >
            </div>
          </div>
          <div class="flex justify-center items-center gap-2">
            <div>
              <label class="input">
                <svg
                  class="h-[1em] opacity-50"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                >
                  <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                  >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                  </g>
                </svg>
                <input
                  id="searchInput"
                  type="search"
                  required
                  placeholder="Search issues..."
                />
              </label>
            </div>
            <div class="">
              <button id="searchBtn" class="btn btn-primary">Search</button>
            </div>
          </div>
        </div>
      </nav>
    </section>
    <section>
      <header class="container mx-auto">
        <!-- Button section -->
        <div
          class="flex items-center gap-4 mt-12 mb-4 py-6 px-3 shadow-sm bg-white"
        >
          <button id="btnAll" class="btn btn-primary">All</button>
          <button id="btnOpen" class="btn btn-outline btn-primary">Open</button>
          <button id="btnClosed" class="btn btn-outline btn-primary">
            Closed
          </button>
        </div>

        <!-- Issues count section -->
        <div
          class="flex justify-between items-center py-0 px-3 shadow-sm bg-white"
        >
          <div class="flex items-center gap-4 py-6 px-3">
            <img src="./assets/Aperture.png" alt="Aperture" />

            <div>
              <h3 class="font-bold text-xl">
                <span id="totalIssues">0</span> Issues
              </h3>
              <p class="text-gray-500 text-sm">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex items-center gap-6 p-4 rounded-md w-fit">
            <!-- Open -->
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-green-500 rounded-full"></span>
              <p class="text-gray-700 font-medium">Open</p>
            </div>

            <!-- Closed -->
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
              <p class="text-gray-700 font-medium">Closed</p>
            </div>
          </div>
        </div>
      </header>

      <main class="container mx-auto">
        <div
          id="allItemContainer"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 p-3"
        >
          <!-- Dynamicly added all card here -->
        </div>

        <!-- Loading bar -->
        <div id="loadingBar" class="text-center">
          <span class="loading loading-bars loading-xl"></span>
        </div>

        <!-- Modal section -->
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="details_modal.showModal()">open modal</button> -->
        <dialog id="details_modal" class="modal modal-bottom sm:modal-middle">
          <div class="modal-box">
            <div
              class="max-w-md mx-auto flex justify-center items-center text-left font-sans"
              id="details-container"
            >
              <!-- Details Card here added daynamically -->
            </div>
            <div class="modal-action">
              <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button
                  class="mt-4 w-fit px-8 py-3 bg-[#3F31D1] text-white font-semibold rounded-xl hover:bg-[#3F31D195] transition shadow-lg"
                >
                  Close
                </button>
              </form>
            </div>
          </div>
        </dialog>
      </main>
    </section>
  </body>
</html>
